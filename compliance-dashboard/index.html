<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiv's Cloud Page</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
    }
    header {
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
    }
    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 80vh;
        text-align: center;
    }
    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        max-width: 400px;
    }
    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #ff7a18;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        background: #ff3c00;
        transform: scale(1.05);
    }
    footer {
        position: absolute;
        bottom: 10px;
        width: 100%;
        text-align: center;
        font-size: 14px;
        opacity: 0.8;
    }
</style>
</head>
<body>

<header>🚀 Welcome to Shiv's Cloud Project</header>

<div class="container">
    <div class="card">
        <h2>Hello 👋</h2>
        <p>This is your first beautiful static website.</p>
        <p>Try connecting this with AWS Lambda 🔥</p>
        <button onclick="showMessage()">Click Me</button>
    </div>
</div>

<footer>Built with ❤️ by Shiv</footer>

<script>
function showMessage() {
    alert("Your website is working perfectly 🚀");
}
</script>

</body>
</html>
